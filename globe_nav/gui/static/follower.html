<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GLOBALNAV — Instruction Follower</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="follower.css" />
</head>
<body>
  <div class="follower-shell">
    <nav class="links">
      <a href="/">← Planner</a>
      <span>GLOBALNAV</span>
    </nav>

    <header class="follower-header">
      <div>
        <p class="eyebrow">Global multi-modal navigation</p>
        <h1>Instruction Follower</h1>
        <p class="subtitle">Global route simulation</p>
      </div>
      <div class="header-metrics" aria-label="route totals">
        <div>
          <span>Total Time</span>
          <strong>--:--</strong>
        </div>
        <div>
          <span>Total Distance</span>
          <strong>-- --</strong>
        </div>
      </div>
    </header>

    <section class="command-card">
      <textarea id="instruction" rows="5">I am at the University of Technology Sydney, facing George Street. First walk to Sydney Airport, fly to Manchester, take the train to Liverpool after leaving the airport, and finally walk to the University of Liverpool.</textarea>
      <div class="ctrl-row">
        <label><input type="checkbox" id="ruleBased" checked /> Rule-based policy</label>
        <label><input type="checkbox" id="noLlm" /> Offline decomposition (no LLM)</label>
        <label><input type="checkbox" id="streetview" checked /> Street View images</label>
        <button id="prepareBtn" type="button">Prepare Route</button>
      </div>
      <div class="status-row">
        <p id="svHint" class="sv-hint"></p>
        <p id="status" class="status"></p>
      </div>
    </section>

    <div class="follower-layout">
      <section class="left-panel">
        <div class="panel-heading">
          <span>Route Options</span>
          <small>Segment choices</small>
        </div>

        <div id="segmentOptions" class="segment-options hidden"></div>
        <section id="meta" class="summary hidden"></section>
      </section>

      <section class="map-panel">
        <div id="map" class="map-container"></div>
      </section>

      <aside class="right-panel">
        <div id="svPanel" class="sv-panel">
          <div class="panel-heading">
            <span>Follower State</span>
            <small>Current observation</small>
          </div>
          <div class="sv-frame">
            <img id="svImage" alt="street view" />
            <div id="svPlaceholder" class="sv-placeholder">
              <span>Street View</span>
              <p>Street View appears here after the route is prepared.</p>
            </div>
          </div>
          <div id="svMeta" class="sv-meta"></div>
          <div id="obsSummary" class="obs-summary"></div>
          <div class="actions-card">
            <div class="panel-heading compact">
              <span>Available Actions</span>
            </div>
            <div id="actionList" class="action-list">
              <button type="button" disabled>Prepare route</button>
            </div>
          </div>
        </div>

        <div id="playback" class="playback hidden">
          <div class="play-ctrl">
            <button id="stepBtn" type="button">Step →</button>
            <button id="playBtn" type="button">▶ Play</button>
            <span id="stepLabel">0 / 0</span>
          </div>
          <input type="range" id="scrubber" min="0" max="0" value="0" />
          <div id="trace" class="trace"></div>
        </div>
      </aside>
    </div>
  </div>

  <div id="clarifyModal" class="clarify-modal hidden">
    <div class="clarify-box">
      <p id="clarifyQuestion"></p>
      <div id="clarifyOptions"></div>
      <input id="clarifyInput" type="text" class="hidden" placeholder="Enter your answer" />
      <button id="clarifySubmit" type="button">Confirm</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="follower.js"></script>
</body>
</html>
